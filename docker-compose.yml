services:
  meeting-notes:
    build: .
    environment:
      LLM_MODEL: ${LLM_MODEL:-qwen3.5:9b}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      COMPUTE_TYPE: float16
      LANGUAGE: ${LANGUAGE:-es}
      PROMPT_TEMPLATE: ${PROMPT_TEMPLATE:-general}
      NUM_CTX: ${NUM_CTX:-16384}
      NUM_GPU: ${NUM_GPU:-}
      OLLAMA_FLASH_ATTENTION: ${OLLAMA_FLASH_ATTENTION:-}
      OLLAMA_KV_CACHE_TYPE: ${OLLAMA_KV_CACHE_TYPE:-}
    volumes:
      - ./audios:/app/audios
      - ./prompts:/app/prompts
      - whisper-cache:/root/.cache/huggingface
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  whisper-cache:
  ollama-models:
